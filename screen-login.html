<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZenRadar — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />

  <style>
    /* ── Screen: Login ─────────────────────────────────────── */

    html, body {
      width: 100%;
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      position: relative;
      min-height: 100dvh;
      padding-bottom: var(--space-10);
    }

    /* ── Content area ─────────────────────────────────────── */
    .content {
      padding: 96px var(--space-4) 0;
    }

    .screen-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
      line-height: var(--leading-snug);
      margin-bottom: var(--space-2);
    }

    .screen-subtitle {
      font-size: var(--text-md);
      color: var(--color-text-secondary);
      line-height: var(--leading-normal);
      margin-bottom: var(--space-8);
    }

    /* ── Form ─────────────────────────────────────────────── */
    .form-group {
      margin-bottom: var(--space-5);
    }

    .form-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }

    .form-label {
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      color: var(--color-text-primary);
    }

    .forgot-link {
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      color: var(--color-primary);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input {
      padding-right: 44px;
    }

    .eye-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
    }

    .cta-wrap {
      margin-top: var(--space-6);
    }

    /* ── Auth footer ──────────────────────────────────────── */
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-base);
      color: var(--color-text-muted);
    }

    .auth-footer a {
      font-weight: var(--font-semibold);
      color: var(--color-primary);
    }
  </style>
</head>
<body>

<div class="screen">

  <!-- Back arrow -->
  <button class="back-btn" onclick="history.back()">
    <svg width="24" height="24" viewBox="0 0 24 24"
      fill="none" stroke="#111827" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <div class="content">

    <h1 class="screen-title">Welcome back</h1>
    <p class="screen-subtitle">Log in to continue your job search and track updates.</p>

    <form onsubmit="return false">

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="input" type="email" id="email"
          placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <div class="form-label-row">
          <label class="form-label" for="password">Password</label>
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input class="input" type="password" id="password"
            placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="eye-btn" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="cta-wrap">
        <button class="btn btn-primary" type="submit">Log In</button>
      </div>

    </form>

    <!-- Divider -->
    <div class="divider">or continue with</div>

    <!-- Social buttons -->
    <button class="btn-social">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M19.6 10.23c0-.68-.06-1.36-.17-2H10v3.79h5.38a4.6 4.6 0 01-2 3.02v2.5h3.23c1.9-1.75 3-4.33 3-7.31z" fill="#4285F4"/>
        <path d="M10 20c2.7 0 4.96-.9 6.62-2.43l-3.23-2.5c-.9.6-2.05.96-3.39.96-2.6 0-4.8-1.76-5.59-4.12H1.07v2.58A10 10 0 0010 20z" fill="#34A853"/>
        <path d="M4.41 11.91A5.95 5.95 0 014.1 10c0-.66.11-1.3.31-1.91V5.51H1.07A10 10 0 000 10c0 1.61.38 3.13 1.07 4.49l3.34-2.58z" fill="#FBBC05"/>
        <path d="M10 3.96c1.47 0 2.79.5 3.83 1.5L16.7 2.6A9.96 9.96 0 0010 0 10 10 0 001.07 5.51l3.34 2.58C5.2 5.72 7.4 3.96 10 3.96z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-social">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="20" height="20" rx="4" fill="#0A66C2"/>
        <path d="M7 8.5H5V15H7V8.5ZM6 5.3a1.2 1.2 0 100 2.4 1.2 1.2 0 000-2.4z" fill="white"/>
        <path d="M15.5 15H13.5V11.75C13.5 10.83 13.08 10.25 12.25 10.25 11.33 10.25 10.5 10.83 10.5 12V15H8.5V8.5H10.5V9.5C10.92 8.75 11.83 8.25 12.75 8.25 14.33 8.25 15.5 9.25 15.5 11.25V15Z" fill="white"/>
      </svg>
      Continue with LinkedIn
    </button>

    <p class="auth-footer">
      New here? <a href="screen-signup.html">Create account</a>
    </p>

  </div>

</div>

</body>
</html>
