<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZenRadar — Filters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />

  <style>
    /* ── Screen: Filters (bottom sheet) ───────────────────── */

    html, body {
      width: 100%;
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      position: relative;
      min-height: 100dvh;
      background: var(--color-background);
    }

    /* ── Dark overlay (simulates home feed behind sheet) ──── */
    .overlay {
      position: relative;
      height: 128px;
      background: rgba(17, 24, 39, 0.5);
    }

    .overlay-hint {
      position: absolute;
      bottom: var(--space-5);
      left: var(--space-4);
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: rgba(255, 255, 255, 0.2);
    }

    /* Back button sits in the overlay area */
    .overlay .back-btn {
      top: 44px;
    }

    .overlay .back-btn svg {
      stroke: #ffffff;
    }

    /* ── Bottom sheet ─────────────────────────────────────── */
    .sheet {
      background: var(--color-surface);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding-bottom: 100px; /* clear fixed apply button */
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.15);
    }

    /* ── Drag handle ──────────────────────────────────────── */
    .drag-handle {
      width: 40px;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      margin: var(--space-3) auto var(--space-1);
    }

    /* ── Sheet header ─────────────────────────────────────── */
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4) var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }

    .sheet-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
    }

    .clear-btn {
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      color: var(--color-primary);
      background: none;
      border: none;
      cursor: pointer;
    }

    /* ── Filter sections ──────────────────────────────────── */
    .filter-section {
      padding: var(--space-4) var(--space-4) 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: var(--space-4);
    }

    .filter-label {
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
      letter-spacing: -0.2px;
      margin-bottom: var(--space-3);
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    /* Selectable filter chip — inactive */
    .filter-chip {
      display: inline-flex;
      align-items: center;
      height: 36px;
      padding: 0 var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .filter-chip.active {
      background: var(--color-primary-tint);
      border-color: transparent;
      color: var(--color-primary);
    }

    /* ── Salary range ─────────────────────────────────────── */
    .salary-section {
      padding: var(--space-4);
    }

    .salary-row-label {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }

    .salary-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .salary-chip {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      background: var(--color-background);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .salary-chip.active {
      background: var(--color-primary-tint);
      border-color: transparent;
      color: var(--color-primary);
    }

    /* ── Fixed apply button ───────────────────────────────── */
    .footer-cta {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--screen-width);
      background: var(--color-surface);
      padding: var(--space-4);
      padding-bottom: max(var(--space-4), env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--color-border);
      z-index: var(--z-sticky);
    }

    .btn-apply {
      position: relative;
      width: 100%;
      height: 52px;
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-family);
      font-size: var(--text-md);
      font-weight: var(--font-semibold);
      letter-spacing: var(--tracking-wide);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      transition: opacity var(--transition-fast);
    }

    .btn-apply:active {
      opacity: 0.9;
    }

    .filter-count {
      width: 20px;
      height: 20px;
      background: var(--color-surface);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="screen">

  <!-- Dark overlay (home feed context) -->
  <div class="overlay">

    <!-- Back arrow -->
    <button class="back-btn" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="#111827" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <p class="overlay-hint">Find your next role</p>
  </div>

  <!-- Bottom sheet -->
  <div class="sheet">

    <div class="drag-handle"></div>

    <!-- Sheet header -->
    <div class="sheet-header">
      <span class="sheet-title">Filters</span>
      <button class="clear-btn">Clear all</button>
    </div>

    <!-- Job Type -->
    <div class="filter-section">
      <p class="filter-label">Job Type</p>
      <div class="filter-chips">
        <button class="filter-chip active">Full-time</button>
        <button class="filter-chip">Part-time</button>
        <button class="filter-chip">Contract</button>
        <button class="filter-chip">Internship</button>
      </div>
    </div>

    <!-- Work Style -->
    <div class="filter-section">
      <p class="filter-label">Work Style</p>
      <div class="filter-chips">
        <button class="filter-chip active">Remote</button>
        <button class="filter-chip active">Hybrid</button>
        <button class="filter-chip">On-site</button>
      </div>
    </div>

    <!-- Posted Within -->
    <div class="filter-section">
      <p class="filter-label">Posted Within</p>
      <div class="filter-chips">
        <button class="filter-chip">24 hours</button>
        <button class="filter-chip active">7 days</button>
        <button class="filter-chip">14 days</button>
        <button class="filter-chip">30 days</button>
        <button class="filter-chip">Any time</button>
      </div>
    </div>

    <!-- Salary Range -->
    <div class="salary-section">
      <p class="filter-label">Salary Range (AUD / year)</p>

      <p class="salary-row-label">Minimum</p>
      <div class="salary-chips">
        <button class="salary-chip active">Any</button>
        <button class="salary-chip">$60k</button>
        <button class="salary-chip">$80k</button>
        <button class="salary-chip">$100k</button>
        <button class="salary-chip">$120k</button>
        <button class="salary-chip">$140k</button>
      </div>

      <p class="salary-row-label">Maximum</p>
      <div class="salary-chips">
        <button class="salary-chip">Any</button>
        <button class="salary-chip">$120k</button>
        <button class="salary-chip">$140k</button>
        <button class="salary-chip active">$160k</button>
        <button class="salary-chip">$200k+</button>
      </div>
    </div>

  </div>

  <!-- Fixed Apply Filters footer -->
  <div class="footer-cta">
    <button class="btn-apply">
      Apply Filters
      <span class="filter-count">3</span>
    </button>
  </div>

</div>

</body>
</html>
